services:
  postgres-api:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yougan
      POSTGRES_PASSWORD: yougan
      POSTGRES_DB: yougan_api
    ports:
      - "5432:5432"
    volumes:
      - yougan_pg_api:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yougan -d yougan_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  # yougan_api 由 POSTGRES_DB 在首次初始化时创建；yougan_agent 在此 idempotent 补建（Agent checkpointer.setup 自建表）
  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres-api:
        condition: service_healthy
    environment:
      PGHOST: postgres-api
      PGUSER: yougan
      PGPASSWORD: yougan
      PGDATABASE: yougan_api
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        psql -tc "SELECT 1 FROM pg_database WHERE datname = 'yougan_agent'" | grep -q 1 \
          || psql -c "CREATE DATABASE yougan_agent;"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - yougan_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  yougan_pg_api:
  yougan_redis:
