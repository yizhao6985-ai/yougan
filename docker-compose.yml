services:
  postgres-api:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yougan
      POSTGRES_PASSWORD: yougan
      POSTGRES_DB: yougan_api
    ports:
      - "5432:5432"
    volumes:
      - yougan_pg_api:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yougan -d yougan_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  # yougan_api 由 POSTGRES_DB 在首次初始化时创建；yougan_agent 在此 idempotent 补建（Agent checkpointer.setup 自建表）
  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres-api:
        condition: service_healthy
    environment:
      PGHOST: postgres-api
      PGUSER: yougan
      PGPASSWORD: yougan
      PGDATABASE: yougan_api
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        psql -tc "SELECT 1 FROM pg_database WHERE datname = 'yougan_agent'" | grep -q 1 \
          || psql -c "CREATE DATABASE yougan_agent;"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - yougan_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 内网穿透入口：公网 :3000 → nginx 分流 API / 前端
  # 开发：docker compose up -d nginx
  # 生产静态：pnpm --filter @yougan/web build && docker compose --profile prod up -d nginx
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx-prod:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  yougan_pg_api:
  yougan_redis:
