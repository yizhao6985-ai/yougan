services:
  postgres-api:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yougan
      POSTGRES_PASSWORD: yougan
      POSTGRES_DB: yougan_api
    ports:
      - "5432:5432"
    volumes:
      - yougan_pg_api:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yougan -d yougan_api"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-agent:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yougan
      POSTGRES_PASSWORD: yougan
      POSTGRES_DB: yougan_agent
    ports:
      - "5433:5432"
    volumes:
      - yougan_pg_agent:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yougan -d yougan_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - yougan_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 内网穿透入口：公网 :3000 → nginx 分流 API / 前端
  # 开发：docker compose up -d nginx
  # 生产静态：pnpm --filter @yougan/web build && docker compose --profile prod up -d nginx
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  nginx-prod:
    profiles: ["prod"]
    image: nginx:1.27-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  yougan_pg_api:
  yougan_pg_agent:
  yougan_redis:
